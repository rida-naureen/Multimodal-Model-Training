# ============================================================
#  config.yaml  —  ALL settings for the project in one place
#  Change values here instead of editing Python files
# ============================================================

data:
  raw_dir:       "data/raw"
  processed_dir: "data/processed"
  splits_dir:    "data/splits"
  test_session:  5          # Session 5 is always the test set
  val_ratio:     0.1        # 10% of train sessions → validation
  emotions:      ["hap", "sad", "ang", "neu"]

model:
  d_model:          256   # shared hidden dimension across all modalities
  num_heads:        4     # attention heads (d_model must be divisible by this)
  dropout:          0.1
  num_classes:      4     # happy, sad, angry, neutral
  text_input_dim:   768   # RoBERTa-base output size
  audio_input_dim:  768   # Wav2Vec2-base output size
  visual_input_dim: 256   # ResNet-50 projected output size

training:
  batch_size:   16
  epochs:       30
  lr:           0.0001
  weight_decay: 0.00001
  patience:     5         # stop early if val acc doesn't improve for 5 epochs

paths:
  checkpoints: "checkpoints/"
  logs:        "logs/"
