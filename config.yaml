# ============================================================
#  config.yaml — ET-TACFN Project Settings
#  Enhanced Trimodal Adaptive Cross-Modal Fusion Network
# ============================================================

data:
  raw_dir:       "data/raw"
  processed_dir: "data/processed"
  splits_dir:    "data/splits"
  test_session:  5
  val_ratio:     0.1
  emotions:      ["hap", "sad", "ang", "neu"]

model:
  d_model:          256        # reduced from 512 — better fit for ~4k utterances
  num_heads:        8          # must divide d_model evenly
  dropout:          0.3        # increased from 0.1 to fight overfitting
  num_classes:      4          # happy, sad, angry, neutral

  # Input dims — must match your extracted .npy files
  text_input_dim:   1024       # RoBERTa-large  (old extract_text.py)
  audio_input_dim:  768        # WavLM-base     (encoders.py)
  visual_input_dim: 2048       # ResNet-50      (encoders.py)

training:
  batch_size:         16
  epochs:             50        # more room to converge now that regularization is stronger
  lr:                 0.0001
  weight_decay:       0.00005   # increased from 0.00001 to fight overfitting
  patience:           10        # increased from 7 to let regularization take effect
  label_smoothing:    0.1
  modality_dropout:   0.2       # increased from 0.15
  grad_accum_steps:   4

paths:
  checkpoints: "checkpoints/"
  logs:        "logs/"
